services:
  - type: web
    name: bugcheck-agent-backend
    runtime: java
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/bugcheck-agent-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/health
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-4.1-mini"
      - key: AGENT_ASSETS_DIR
        value: "/tmp/opencode"
