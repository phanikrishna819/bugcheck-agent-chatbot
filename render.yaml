services:
  - type: web
    name: bugcheck-agent-backend
    runtime: docker
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-4.1-mini"
      - key: AGENT_ASSETS_DIR
        value: "/tmp/opencode"

  - type: static_site
    name: bugcheck-agent-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
