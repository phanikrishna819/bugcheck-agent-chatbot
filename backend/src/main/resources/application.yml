server:
  port: 8088

spring:
  application:
    name: bugcheck-agent-backend

app:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4.1-mini}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  agent:
    assets-dir: ${AGENT_ASSETS_DIR:${USERPROFILE:${user.home}}/.config/opencode}
    max-tool-rounds: ${AGENT_MAX_TOOL_ROUNDS:8}
